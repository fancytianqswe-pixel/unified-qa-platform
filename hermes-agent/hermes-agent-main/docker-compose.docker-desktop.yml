services:
  gateway:
    build: .
    image: hermes-agent
    container_name: hermes
    restart: unless-stopped
    networks:
      - hermes-net
    ports:
      - "8642:8642"
    volumes:
      # 含 chat-uploads：Next 默认写入 ~/.hermes/chat-uploads，网关在容器内读 /opt/data/chat-uploads
      - ~/.hermes:/opt/data
      # 鐎瑰じ瀵岄惄顔肩秿 閳?鐎圭懓娅?/opt/platform-skills閵嗗倿绮拋銈囨祲鐎佃婀?compose 閺傚洣娆㈤幍鈧崷銊ф窗瑜版洜娈?../../platform-skills閿涘牆宓嗘禒鎾崇氨閺嶇櫢绱氶妴?
      # 閼汇儳鏅棃銏″Η閼宠姤鏆熼張顏勵杻閸旂媴绱濋崷?*閺堫剚鏋冩禒璺烘倱閻╊喖缍?*閸掓稑缂?.env 鐠佸墽鐤嗙紒婵嗩嚠鐠侯垰绶為敍灞肩伐婵″偊绱?
      #   PLATFORM_SKILLS_BIND=C:/Users/you/cursor/platform-skills
      - ${PLATFORM_SKILLS_BIND:-../../platform-skills}:/opt/platform-skills:ro
      # 统一质检平台内置 stdio MCP（datasource / mineru-*）供 ~/.hermes/config.yaml 中 /opt/xingyan-mcp/... 引用
      - ${XINGYAN_MCP_SERVERS_BIND:-../../mcp-servers}:/opt/xingyan-mcp:ro
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      - API_SERVER_KEY=${API_SERVER_KEY:-hermes-local-docker-desktop-dev}
      # 统一质检平台 Next 在宿主机、Gateway 在容器：内置 datasource 工具 HTTP 调 Next /api/datasource/*
      - DATASOURCE_MCP_BASE_URL=${DATASOURCE_MCP_BASE_URL:-http://host.docker.internal:3000}
      # API Server 对话：优先 MCP（MinerU/datasource），再 skill_view；设为 0/false/off 关闭
      - HERMES_XINGYAN_PREFER_MCP_TOOLS=${HERMES_XINGYAN_PREFER_MCP_TOOLS:-1}
      # 长对话 SSE：更频繁 keepalive，降低代理/中间层 15min 级 idle 断连（terminated）
      - HERMES_SSE_KEEPALIVE_SECONDS=${HERMES_SSE_KEEPALIVE_SECONDS:-15}
      - HERMES_RUN_SSE_POLL_SECONDS=${HERMES_RUN_SSE_POLL_SECONDS:-60}
    command: ["gateway", "run"]

  dashboard:
    image: hermes-agent
    container_name: hermes-dashboard
    restart: unless-stopped
    networks:
      - hermes-net
    ports:
      - "9119:9119"
    depends_on:
      - gateway
    volumes:
      - ~/.hermes:/opt/data
      # 娑?gateway 娑撯偓閼疯揪绱癉ashboard 閻?/api/skills 閸︺劌顔愰崳銊ュ敶閹殿偆娲忛敍宀勬付閼冲€燁問闂?external_dirs 閹稿洤鎮滈惃鍕熅瀵?
      - ${PLATFORM_SKILLS_BIND:-../../platform-skills}:/opt/platform-skills:ro
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - GATEWAY_HEALTH_URL=http://gateway:8642
      - HERMES_GATEWAY_URL=http://gateway:8642
    command: ["dashboard", "--host", "0.0.0.0", "--insecure", "--no-open"]

networks:
  hermes-net:
    driver: bridge


